<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INVITATION - NEW KAWAII WEDDING</title>
    <style>
        /* 全体のスタイル設定 */
        :root {
            --primary-pink: #ff69b4;
            --bg-pink: #fff0f5;
            --accent-mint: #e6f7f4;
            --accent-purple: #f3e6f7;
            --text-dark: #4a4a4a;
            --border-color: #ffb6c1;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg-pink);
            background-image: radial-gradient(#ffb6c1 8%, transparent 8%);
            background-size: 24px 24px;
            color: var(--text-dark);
            margin: 0;
            padding: 20px 10px;
            display: flex;
            justify-content: center;
        }

        .container-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .form-container {
            max-width: 480px;
            width: 100%;
            background: #ffffff;
            border: 3px solid var(--primary-pink);
            border-radius: 30px;
            box-shadow: 0 8px 20px rgba(255, 105, 180, 0.15);
            padding: 30px 20px;
            box-sizing: border-box;
        }

        .scroll-down {
            text-align: center;
            font-size: 11px;
            letter-spacing: 2px;
            color: #aaa;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-size: 36px;
            color: var(--primary-pink);
            letter-spacing: 2px;
            margin: 0;
            text-shadow: 2px 2px 0px #fff, 4px 4px 0px var(--accent-purple);
        }

        .header-deco {
            font-size: 20px;
            color: var(--primary-pink);
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 30px;
        }

        .label-container {
            text-align: center;
            margin-bottom: 12px;
        }

        .label-text {
            font-size: 16px;
            font-weight: bold;
            color: var(--text-dark);
        }

        .required-badge {
            background-color: transparent;
            color: var(--primary-pink);
            border: 1px dashed var(--primary-pink);
            font-size: 11px;
            padding: 1px 6px;
            border-radius: 4px;
            margin-left: 5px;
            vertical-align: middle;
        }

        .sub-text {
            font-size: 11px;
            color: #888;
            text-align: center;
            margin-top: -5px;
            margin-bottom: 10px;
        }

        input[type="text"],
        input[type="tel"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 15px;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s;
            text-align: center;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary-pink);
            box-shadow: 0 0 8px rgba(255, 105, 180, 0.2);
        }

        .flex-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .flex-row input {
            flex: 1;
        }

        .radio-group {
            display: flex;
            gap: 12px;
        }

        .radio-label {
            flex: 1;
            position: relative;
        }

        .radio-label input[type="radio"] {
            display: none;
        }

        .radio-button {
            display: block;
            text-align: center;
            padding: 12px;
            background: #fff;
            border: 2px solid var(--border-color);
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .radio-label input[type="radio"]:checked + .btn-pink {
            background-color: #ffe4e1;
            border-color: var(--primary-pink);
            color: var(--primary-pink);
        }

        .radio-label input[type="radio"]:checked + .btn-mint {
            background-color: var(--accent-mint);
            border-color: #4db6ac;
            color: #00796b;
        }

        .textarea-dots {
            background-image: radial-gradient(#e0e0e0 10%, transparent 10%);
            background-size: 16px 16px;
            text-align: left !important;
        }

        /* 画像アップロード関連のスタイル */
        .upload-container {
            display: flex;
            gap: 15px;
        }

        .upload-box {
            flex: 1;
            border: 2px dashed var(--border-color);
            border-radius: 15px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            background: #fafafa;
            transition: background 0.3s;
            position: relative;
        }

        .upload-box:hover {
            background: var(--bg-pink);
        }

        .upload-icon {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .upload-text {
            font-size: 12px;
            font-weight: bold;
            line-height: 1.4;
        }

        .upload-note {
            font-size: 10px;
            color: #777;
            margin-top: 10px;
            line-height: 1.5;
        }

        /* プレビュー画像表示エリア */
        .preview-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
            justify-content: center;
        }

        .preview-item {
            position: relative;
            width: 60px;
            height: 60px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .preview-remove {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .submit-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background-color: var(--primary-pink);
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 4px 10px rgba(255, 105, 180, 0.3);
            transition: all 0.3s;
        }

        .submit-btn:hover {
            opacity: 0.9;
        }

        .submit-btn:disabled {
            background-color: #d3d3d3;
            cursor: not-allowed;
            box-shadow: none;
        }
    </style>
</head>
<body>

<div style="
    position: fixed;
    inset: 0;
    z-index: 9999;
    pointer-events: none;
    border: 10px solid transparent;
    border-image: linear-gradient(to top, #ff4b4b, #ffa500, #fff000, #98fb98, #87ceeb, #ffb7c5, #e0b0ff) 1;
    box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.5);
"></div>

<div class="container-wrapper">
    <div class="form-container">
        <div class="scroll-down">SCROLL DOWN</div>

        <div class="header">
            <h1>INVITATION</h1>
            <div class="header-deco">✧･ﾟ: *✧･ﾟ:*</div>
        </div>

        <form id="invitationForm">
            
            <!-- ご出欠 -->
            <div class="form-group">
                <div class="label-container">
                    <span class="label-text">ご出欠</span><span class="required-badge">必須</span>
                </div>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="attendance" value="出席" required>
                        <span class="radio-button btn-pink">● ご出席</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="attendance" value="欠席">
                        <span class="radio-button btn-mint">● ご欠席</span>
                    </label>
                </div>
            </div>

            <!-- お名前 ＋ ふりがなを追加 -->
            <div class="form-group">
                <div class="label-container">
                    <span class="label-text">お名前</span><span class="required-badge">必須</span>
                </div>
                <div class="flex-row">
                    <input type="text" name="lastName" placeholder="姓" required>
                    <input type="text" name="firstName" placeholder="名" required>
                </div>
                <div class="flex-row">
                    <input type="text" name="lastNameKana" placeholder="せい（ふりがな）" required>
                    <input type="text" name="firstNameKana" placeholder="めい（ふりがな）" required>
                </div>
            </div>

            <!-- ご連名 -->
            <div class="form-group">
                <div class="label-container">
                    <span class="label-text">ご連名</span>
                </div>
                <div class="sub-text">※4名までご入力いただけます</div>
                
                <div class="flex-row">
                    <input type="text" name="sub1" placeholder="連名1">
                    <input type="text" name="sub1Kana" placeholder="連名1 ふりがな">
                </div>
                <div class="flex-row">
                    <input type="text" name="sub2" placeholder="連名2">
                    <input type="text" name="sub2Kana" placeholder="連名2 ふりがな">
                </div>
                <div class="flex-row">
                    <input type="text" name="sub3" placeholder="連名3">
                    <input type="text" name="sub3Kana" placeholder="連名3 ふりがな">
                </div>
                <div class="flex-row">
                    <input type="text" name="sub4" placeholder="連名4">
                    <input type="text" name="sub4Kana" placeholder="連名4 ふりがな">
                </div>
            </div>

            <!-- いずれかをお選びください -->
            <div class="form-group">
                <div class="label-container">
                    <span class="label-text">いずれかをお選びください</span><span class="required-badge">必須</span>
                </div>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="guestType" value="新郎ゲスト" required>
                        <span class="radio-button btn-pink">● 新郎ゲスト</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="guestType" value="新婦ゲスト">
                        <span class="radio-button btn-mint">● 新婦ゲスト</span>
                    </label>
                </div>
            </div>

            <!-- 電話番号 -->
            <div class="form-group">
                <div class="label-container">
                    <span class="label-text">電話番号</span><span class="required-badge">必須</span>
                </div>
                <input type="tel" name="phone" placeholder="09012345678" required>
            </div>

            <!-- メールアドレス -->
            <div class="form-group">
                <div class="label-container">
                    <span class="label-text">メールアドレス</span><span class="required-badge">必須</span>
                </div>
                <input type="email" name="email" placeholder="mail@mail.com" required>
            </div>

            <!-- 郵便番号（自動入力イベントを追加） -->
            <div class="form-group">
                <div class="label-container">
                    <span class="label-text">郵便番号</span>
                </div>
                <div class="sub-text">※ハイフンなしで入力すると住所が自動入力されます</div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span style="font-weight: bold;">〒</span>
                    <input type="text" id="zipcode" name="zipcode" placeholder="1600022" style="text-align: left; max-width: 200px;">
                </div>
            </div>

            <!-- ご住所 -->
            <div class="form-group">
                <div class="label-container">
                    <span class="label-text">ご住所</span>
                </div>
                <div style="margin-bottom: 10px;">
                    <select id="pref" name="pref">
                        <option value="">都道府県</option>
                        <option value="北海道">北海道</option><option value="青森県">青森県</option><option value="岩手県">岩手県</option><option value="宮城県">宮城県</option><option value="秋田県">秋田県</option><option value="山形県">山形県</option><option value="福島県">福島県</option><option value="茨城県">茨城県</option><option value="栃木県">栃木県</option><option value="群馬県">群馬県</option><option value="埼玉県">埼玉県</option><option value="千葉県">千葉県</option><option value="東京都">東京都</option><option value="神奈川県">神奈川県</option><option value="新潟県">新潟県</option><option value="富山県">富山県</option><option value="石川県">石川県</option><option value="福井県">福井県</option><option value="山梨県">山梨県</option><option value="長野県">長野県</option><option value="岐阜県">岐阜県</option><option value="静岡県">静岡県</option><option value="愛知県">愛知県</option><option value="三重県">三重県</option><option value="滋賀県">滋賀県</option><option value="京都府">京都府</option><option value="大阪府">大阪府</option><option value="兵庫県">兵庫県</option><option value="奈良県">奈良県</option><option value="和歌山県">和歌山県</option><option value="鳥取県">鳥取県</option><option value="島根県">島根県</option><option value="岡山県">岡山県</option><option value="広島県">広島県</option><option value="山口県">山口県</option><option value="徳島県">徳島県</option><option value="香川県">香川県</option><option value="愛媛県">愛媛県</option><option value="高知県">高知県</option><option value="福岡県">福岡県</option><option value="佐賀県">佐賀県</option><option value="長崎県">長崎県</option><option value="熊本県">熊本県</option><option value="大分県">大分県</option><option value="宮崎県">宮崎県</option><option value="鹿児島県">鹿児島県</option><option value="沖縄県">沖縄県</option>
                    </select>
                </div>
                <div style="margin-bottom: 10px;">
                    <input type="text" id="address1" name="address1" placeholder="市区町村や番地" style="text-align: left;">
                </div>
                <div>
                    <input type="text" name="address2" placeholder="マンションや建物名など" style="text-align: left;">
                </div>
            </div>

            <!-- アレルギーについて -->
            <div class="form-group">
                <div class="label-container">
                    <span class="label-text">アレルギーについて</span>
                </div>
                <div class="sub-text">アレルギーなど食べられないものがございましたら<br>ご遠慮なくお書き添えください</div>
                <textarea name="allergy" rows="5" class="textarea-dots"></textarea>
            </div>

            <!-- お祝い画像（実際のファイル選択とプレビューを実装） -->
            <div class="form-group">
                <div class="label-container">
                    <span class="label-text">お祝い画像</span>
                </div>
                <div class="upload-container">
                    <!-- 隠しインプット（複数、画像のみ許可） -->
                    <input type="file" id="fileInput" multiple accept="image/*" style="display: none;">
                    
                    <div class="upload-box" id="uploadBox">
                        <div class="upload-icon">📷</div>
                        <div class="upload-text">画像を<br>アップロード</div>
                    </div>
                    <div class="upload-box" onclick="alert('テンプレート機能は現在準備中です！')">
                        <div class="upload-icon">🎨</div>
                        <div class="upload-text">テンプレート<br>画像から選ぶ</div>
                    </div>
                </div>
                
                <!-- 選択された画像のプレビューエリア -->
                <div class="preview-container" id="previewContainer"></div>

                <div class="upload-note">
                    ※10枚までアップロード可能<br>
                    ※対応している画像の種類：JPG形式、PNG形式、GIF形式<br>
                    （ファイルサイズ：1ファイル15MBまで）
                </div>
            </div>

            <button type="submit" id="submitBtn" class="submit-btn">招待状に回答する</button>
        </form>
    </div>
</div>

<script>
    // 1. 郵便番号から住所を自動入力するシステム
    document.getElementById('zipcode').addEventListener('input', async function() {
        const zip = this.value.replace('-', ''); // ハイフンを除去
        if (zip.length === 7) {
            try {
                const response = await fetch(`https://api.zipaddress.net/?zipcode=${zip}`);
                const result = await response.json();
                if (result.code === 200) {
                    document.getElementById('pref').value = result.data.pref;
                    document.getElementById('address1').value = result.data.address;
                }
            } catch (error) {
                console.error('住所の取得に失敗しました:', error);
            }
        }
    });

    // 2. お祝い画像の選択＆プレビュー処理
    const uploadBox = document.getElementById('uploadBox');
    const fileInput = document.getElementById('fileInput');
    const previewContainer = document.getElementById('previewContainer');
    let selectedFiles = []; // 選択されたファイルを保持する配列

    uploadBox.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', function() {
        const files = Array.from(this.files);
        
        // 10枚制限のチェック
        if (selectedFiles.length + files.length > 10) {
            alert('画像は最大10枚まで選択できます。');
            return;
        }

        files.forEach(file => {
            if (!file.type.startsWith('image/')) return;
            if (file.size > 15 * 1024 * 1024) {
                alert(`${file.name} はサイズが15MBを超えているため選択できません。`);
                return;
            }

            selectedFiles.push(file);

            // プレビュー用のHTML要素を生成
            const reader = new FileReader();
            reader.onload = function(e) {
                const item = document.createElement('div');
                item.className = 'preview-item';
                item.innerHTML = `
                    <img src="${e.target.result}">
                    <div class="preview-remove">×</div>
                `;
                
                // 削除ボタンの挙動
                item.querySelector('.preview-remove').addEventListener('click', () => {
                    const index = selectedFiles.indexOf(file);
                    if (index > -1) selectedFiles.splice(index, 1);
                    item.remove();
                });

                previewContainer.appendChild(item);
            };
            reader.readAsDataURL(file);
        });
    });

    // 3. GAS通信およびデータ送信処理
    document.getElementById('invitationForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerText = '送信中...';

        const formData = new FormData(this);
        const data = Object.fromEntries(formData.entries());

        // ⚠️ ご自身のGASのウェブアプリURLをここに貼り付けてください
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbykCExU1rhSK-8Y6TvRRNJkV7dhZaRweqNRUcJ5gc6gRXEyqpyuiFTRcYwl2oJxEwJl/exec'; 

        try {
            const response = await fetch(GAS_URL, {
                method: 'POST',
                mode: 'cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (result.status === 'success') {
                document.getElementById('invitationForm').innerHTML = `
                    <div style="text-align: center; color: #ff69b4; font-weight: bold; padding: 60px 0;">
                        <p style="font-size: 24px; margin-bottom: 20px;">✨ ありがとうございます ✨</p>
                        <p style="font-size: 16px; line-height: 1.8; color: #4a4a4a;">
                            ご出欠の回答を受け付けました。<br>
                            データは正常に保存されました。
                        </p>
                        <p style="margin-top: 24px; font-size: 14px; color: #ff69b4;">当日お会いできるのを楽しみにしております！</p>
                    </div>
                `;
            } else {
                alert('エラーが発生しました。時間をおいて再度お試しください。');
                submitBtn.disabled = false;
                submitBtn.innerText = '招待状に回答する';
            }
        } catch (error) {
            console.error('Error:', error);
            alert('通信に失敗しました。電波の良い環境で再度お試しください。');
            submitBtn.disabled = false;
            submitBtn.innerText = '招待状に回答する';
        }
    });
</script>

</body>
</html>
